<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow · Pro Todo</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- CSS Variables for theming ----- */
    :root {
      --app-primary: #6C63FF;
      --app-secondary: #FF6584;
      --app-bg-start: #f0f0ff;
      --app-bg-end: #e8e0ff;
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-primary: #2d1b0e;
      --text-secondary: #5a4a3a;
      --shadow-color: rgba(80, 50, 20, 0.2);
      --border-light: rgba(255, 235, 200, 0.5);
      --input-bg: #ffffff;
      --task-bg: #fefcf5;
      --task-shadow: #c9ab86;
      --complete-bg: #d9d0bd;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, var(--app-bg-start) 0%, var(--app-bg-end) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      transition: background 0.4s ease;
    }

    .todo-app {
      max-width: 780px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 48px 48px 32px 32px;
      padding: 2rem 2.2rem 2.2rem;
      box-shadow: 0 30px 60px -10px var(--shadow-color), 
                  inset 0 1px 2px rgba(255, 255, 255, 0.7);
      border: 1px solid var(--border-light);
      transition: all 0.3s ease;
    }

    /* ----- HEADER with customizations ----- */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    .title-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .title-group h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.5);
    }
    .title-group h1 i {
      color: var(--app-primary);
      margin-right: 0.3rem;
    }

    .app-controls {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .color-picker-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255, 255, 255, 0.6);
      padding: 0.2rem 0.8rem 0.2rem 0.6rem;
      border-radius: 60px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.04);
    }
    .color-picker-wrap label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .color-picker-wrap input[type="color"] {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 60px;
      background: transparent;
      cursor: pointer;
      padding: 0;
      border: 2px solid rgba(255,255,255,0.5);
    }
    .color-picker-wrap input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    .color-picker-wrap input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 60px;
    }

    .app-name-edit {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .app-name-edit input {
      border: none;
      background: rgba(255,255,255,0.7);
      padding: 0.4rem 1rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
      width: 130px;
      outline: 2px solid transparent;
      transition: 0.15s;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .app-name-edit input:focus {
      outline: 2px solid var(--app-primary);
      background: white;
    }
    .app-name-edit button {
      background: var(--app-primary);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 3px 0 rgba(0,0,0,0.15);
    }
    .app-name-edit button:active {
      transform: translateY(3px);
      box-shadow: 0 0px 0 rgba(0,0,0,0.15);
    }

    /* ----- ADD SECTION ----- */
    .add-section {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      background: rgba(255, 247, 235, 0.5);
      padding: 0.8rem 1.2rem 1.2rem 1.2rem;
      border-radius: 80px;
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.02), 0 6px 0 rgba(0,0,0,0.04);
      margin-bottom: 2rem;
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
    }

    .add-section input[type="text"] {
      flex: 2 1 180px;
      padding: 0.9rem 1.4rem;
      border: none;
      border-radius: 60px;
      background: var(--input-bg);
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.02), 0 2px 0 rgba(0,0,0,0.04);
      transition: 0.1s ease;
      outline: 2px solid transparent;
    }
    .add-section input[type="text"]:focus {
      outline: 2px solid var(--app-primary);
    }

    .datetime-group {
      display: flex;
      flex: 2 1 220px;
      gap: 0.4rem;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 60px;
      padding: 0.2rem 0.2rem 0.2rem 0.8rem;
      align-items: center;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
    }
    .datetime-group i {
      color: var(--app-primary);
      font-size: 1.1rem;
    }
    .datetime-group input[type="date"],
    .datetime-group input[type="time"] {
      border: none;
      background: transparent;
      font-size: 0.9rem;
      padding: 0.6rem 0.2rem;
      color: var(--text-primary);
      font-weight: 500;
      border-radius: 40px;
      outline: none;
      width: auto;
      min-width: 90px;
    }
    .datetime-group input[type="date"]::-webkit-calendar-picker-indicator,
    .datetime-group input[type="time"]::-webkit-calendar-picker-indicator {
      filter: sepia(0.3) hue-rotate(-10deg);
      cursor: pointer;
    }

    .add-btn {
      background: var(--app-primary);
      border: none;
      border-radius: 60px;
      padding: 0.7rem 2rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 6px 0 rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all 0.07s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      letter-spacing: 0.5px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .add-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.15);
    }
    .add-btn:hover {
      filter: brightness(1.05);
      transform: scale(0.97);
    }

    /* ----- TASK LIST ----- */
    .task-list {
      list-style: none;
      margin: 0.5rem 0 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 0.3rem;
    }
    .task-list::-webkit-scrollbar {
      width: 8px;
    }
    .task-list::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.04);
      border-radius: 20px;
    }
    .task-list::-webkit-scrollbar-thumb {
      background: var(--app-primary);
      border-radius: 20px;
      opacity: 0.5;
    }

    .task-item {
      background: var(--task-bg);
      border-radius: 100px;
      padding: 0.6rem 1.2rem 0.6rem 1.8rem;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem 0.8rem;
      box-shadow: 0 6px 0 var(--task-shadow), 0 6px 16px rgba(0,0,0,0.04);
      border: 1px solid rgba(255,255,255,0.4);
      transition: all 0.2s ease;
      animation: popIn 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    }
    @keyframes popIn {
      0% { transform: scale(0.85) rotate(-1deg); opacity: 0.4; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .task-item.completed {
      background: var(--complete-bg);
      box-shadow: 0 4px 0 #a1917a;
      border-color: #bfaf93;
      opacity: 0.8;
    }
    .task-item.completed .task-text {
      text-decoration: line-through 2px var(--text-secondary);
      color: var(--text-secondary);
    }

    .task-text {
      flex: 2 1 150px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.5);
      padding: 0.2rem 1rem 0.2rem 0.8rem;
      border-radius: 60px;
      color: var(--text-secondary);
      font-weight: 500;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
    }
    .task-meta i {
      color: var(--app-primary);
      font-size: 0.9rem;
    }

    .task-actions {
      display: flex;
      gap: 0.3rem;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .task-actions button {
      background: transparent;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 60px;
      font-size: 1.1rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: 0.1s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.5);
      box-shadow: 0 3px 0 rgba(0,0,0,0.06);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .task-actions button:active {
      transform: translateY(3px);
      box-shadow: 0 0px 0 rgba(0,0,0,0.06);
    }
    .task-actions .edit-btn { background: rgba(255, 215, 150, 0.6); }
    .task-actions .delete-btn { background: rgba(255, 150, 150, 0.5); color: #a04030; }
    .task-actions .complete-btn { background: rgba(150, 220, 150, 0.5); color: #2a6b2a; }
    .task-actions .complete-btn.completed-btn { background: rgba(180, 170, 150, 0.5); color: #5a4a3a; }

    /* edit inline */
    .edit-input {
      flex: 2 1 150px;
      padding: 0.3rem 1rem;
      border-radius: 60px;
      border: 2px solid var(--app-primary);
      background: white;
      font-weight: 500;
      font-size: 1rem;
      outline: none;
    }

    .empty-message {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 1.2rem;
      background: rgba(255,255,255,0.3);
      border-radius: 100px;
      backdrop-filter: blur(2px);
    }

    /* footer */
    .footer-stats {
      margin-top: 1.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      background: rgba(255,255,255,0.3);
      padding: 0.6rem 1.6rem;
      border-radius: 80px;
      backdrop-filter: blur(4px);
      font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .footer-stats span i {
      margin-right: 6px;
      color: var(--app-primary);
    }

    .clear-btn {
      background: rgba(255,255,255,0.5);
      border: none;
      padding: 0.3rem 1.6rem;
      border-radius: 60px;
      font-weight: 600;
      color: var(--text-primary);
      box-shadow: 0 4px 0 rgba(0,0,0,0.04);
      cursor: pointer;
      transition: 0.06s linear;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .clear-btn:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 rgba(0,0,0,0.04);
    }

    /* responsive */
    @media (max-width: 600px) {
      .todo-app { padding: 1.2rem; }
      .add-section { border-radius: 40px; }
      .task-item { border-radius: 40px; padding: 0.6rem 1rem; }
      .title-group h1 { font-size: 1.6rem; }
      .app-name-edit input { width: 90px; }
    }
  </style>
</head>
<body>

<div class="todo-app" id="appContainer">
  <!-- Header with customization -->
  <div class="app-header">
    <div class="title-group">
      <h1 id="appTitle"><i class="fas fa-tasks"></i> TaskFlow</h1>
    </div>
    <div class="app-controls">
      <div class="color-picker-wrap">
        <label for="themeColor"><i class="fas fa-palette"></i></label>
        <input type="color" id="themeColor" value="#6C63FF">
      </div>
      <div class="app-name-edit">
        <input type="text" id="appNameInput" value="TaskFlow" maxlength="20" placeholder="App name">
        <button id="updateNameBtn" title="Update name"><i class="fas fa-check"></i></button>
      </div>
    </div>
  </div>

  <!-- add task -->
  <div class="add-section">
    <input type="text" id="taskInput" placeholder="✨ add a task..." />
    <div class="datetime-group">
      <i class="fas fa-calendar-alt"></i>
      <input type="date" id="taskDate" />
      <i class="fas fa-clock"></i>
      <input type="time" id="taskTime" value="12:00" />
    </div>
    <button class="add-btn" id="addBtn"><i class="fas fa-plus-circle"></i> add</button>
  </div>

  <!-- task list -->
  <ul class="task-list" id="taskList"></ul>

  <!-- footer -->
  <div class="footer-stats">
    <span><i class="fas fa-list-check"></i> <span id="taskCount">0</span> tasks</span>
    <button class="clear-btn" id="clearCompletedBtn"><i class="fas fa-broom"></i> clear done</button>
  </div>
</div>

<script>
  (function() {
    // ----- STATE -----
    let tasks = [];
    let editingId = null;
    let appName = 'TaskFlow';

    // DOM refs
    const taskListEl = document.getElementById('taskList');
    const taskInput = document.getElementById('taskInput');
    const taskDate = document.getElementById('taskDate');
    const taskTime = document.getElementById('taskTime');
    const addBtn = document.getElementById('addBtn');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');
    const taskCountSpan = document.getElementById('taskCount');
    const appTitle = document.getElementById('appTitle');
    const appNameInput = document.getElementById('appNameInput');
    const updateNameBtn = document.getElementById('updateNameBtn');
    const themeColorInput = document.getElementById('themeColor');
    const appContainer = document.getElementById('appContainer');

    // ----- THEME -----
    function applyTheme(color) {
      const root = document.documentElement;
      root.style.setProperty('--app-primary', color);
      // also secondary tint
      const r = parseInt(color.slice(1,3), 16);
      const g = parseInt(color.slice(3,5), 16);
      const b = parseInt(color.slice(5,7), 16);
      const secondary = `hsl(${Math.round((r+g+b)/3 + 20)}, 80%, 65%)`;
      root.style.setProperty('--app-secondary', secondary);
      // background tints
      root.style.setProperty('--app-bg-start', `hsl(${Math.round((r+g+b)/3 + 30)}, 40%, 95%)`);
      root.style.setProperty('--app-bg-end', `hsl(${Math.round((r+g+b)/3 + 10)}, 50%, 90%)`);
    }

    themeColorInput.addEventListener('input', (e) => {
      applyTheme(e.target.value);
    });

    // ----- APP NAME -----
    function updateAppName(name) {
      if (name.trim() === '') return;
      appName = name.trim();
      appTitle.innerHTML = `<i class="fas fa-tasks"></i> ${appName}`;
      appNameInput.value = appName;
    }

    updateNameBtn.addEventListener('click', () => {
      updateAppName(appNameInput.value);
    });
    appNameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') updateAppName(appNameInput.value);
    });

    // ----- DATE default -----
    (function setDefaultDate() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      taskDate.value = `${yyyy}-${mm}-${dd}`;
    })();

    // ----- helpers -----
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return dateStr;
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[parseInt(parts[1],10)-1]} ${parseInt(parts[2],10)}, ${parts[0]}`;
    }
    function formatTime(timeStr) {
      if (!timeStr) return '';
      const [h, m] = timeStr.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const hour12 = h % 12 || 12;
      return `${hour12}:${String(m).padStart(2, '0')} ${ampm}`;
    }
    function genId() { return Date.now() + '_' + Math.random().toString(36).substr(2, 6); }

    // ----- RENDER -----
    function render() {
      const sorted = [...tasks].sort((a, b) => {
        if (a.date && b.date && a.date !== b.date) return a.date.localeCompare(b.date);
        if (a.time && b.time && a.time !== b.time) return a.time.localeCompare(b.time);
        return 0;
      });

      taskListEl.innerHTML = '';
      if (sorted.length === 0) {
        taskListEl.innerHTML = `<div class="empty-message"><i class="fas fa-face-smile"></i>  all done! add a task ✨</div>`;
      } else {
        sorted.forEach(task => {
          const li = document.createElement('li');
          li.className = `task-item ${task.completed ? 'completed' : ''}`;
          li.dataset.id = task.id;

          const isEditing = (editingId === task.id);

          const textSpan = document.createElement('span');
          textSpan.className = 'task-text';
          if (isEditing) {
            const inputEdit = document.createElement('input');
            inputEdit.type = 'text';
            inputEdit.className = 'edit-input';
            inputEdit.value = task.text;
            inputEdit.dataset.id = task.id;
            setTimeout(() => inputEdit.focus(), 50);
            textSpan.appendChild(inputEdit);
          } else {
            textSpan.textContent = task.text;
          }

          const metaDiv = document.createElement('div');
          metaDiv.className = 'task-meta';
          let metaHtml = '';
          if (task.date) metaHtml += `<i class="fas fa-calendar-day"></i> ${formatDate(task.date)}`;
          if (task.time) metaHtml += `  <i class="fas fa-clock"></i> ${formatTime(task.time)}`;
          if (!task.date && !task.time) metaHtml = `<i class="fas fa-hourglass-start"></i> no time`;
          metaDiv.innerHTML = metaHtml;

          const actionsDiv = document.createElement('div');
          actionsDiv.className = 'task-actions';

          // complete toggle
          const completeBtn = document.createElement('button');
          completeBtn.className = `complete-btn ${task.completed ? 'completed-btn' : ''}`;
          completeBtn.innerHTML = task.completed ? '<i class="fas fa-undo-alt"></i>' : '<i class="fas fa-check-circle"></i>';
          completeBtn.title = task.completed ? 'uncomplete' : 'complete';
          completeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleComplete(task.id);
          });

          // edit
          const editBtn = document.createElement('button');
          editBtn.className = 'edit-btn';
          editBtn.innerHTML = isEditing ? '<i class="fas fa-save"></i>' : '<i class="fas fa-pen"></i>';
          editBtn.title = isEditing ? 'save edit' : 'edit task';
          editBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isEditing) {
              const inputField = li.querySelector('.edit-input');
              if (inputField) {
                const newText = inputField.value.trim();
                if (newText === '') { alert('task cannot be empty'); return; }
                updateTaskText(task.id, newText);
                editingId = null;
                render();
              }
            } else {
              editingId = task.id;
              render();
            }
          });

          // delete
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
          deleteBtn.title = 'delete task';
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteTask(task.id);
          });

          actionsDiv.append(completeBtn, editBtn, deleteBtn);
          li.append(textSpan, metaDiv, actionsDiv);
          taskListEl.appendChild(li);
        });
      }

      taskCountSpan.textContent = tasks.length;
    }

    // ----- CRUD -----
    function addTask(text, date, time) {
      if (!text.trim()) return false;
      tasks.push({
        id: genId(),
        text: text.trim(),
        date: date || '',
        time: time || '',
        completed: false,
      });
      editingId = null;
      render();
      return true;
    }
    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      if (editingId === id) editingId = null;
      render();
    }
    function toggleComplete(id) {
      const task = tasks.find(t => t.id === id);
      if (task) { task.completed = !task.completed; render(); }
    }
    function updateTaskText(id, newText) {
      const task = tasks.find(t => t.id === id);
      if (task) { task.text = newText.trim() || task.text; render(); }
    }
    function clearCompleted() {
      tasks = tasks.filter(t => !t.completed);
      if (editingId && !tasks.some(t => t.id === editingId)) editingId = null;
      render();
    }
    function resetInputs() {
      taskInput.value = '';
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      taskDate.value = `${yyyy}-${mm}-${dd}`;
      taskTime.value = '12:00';
      taskInput.focus();
    }

    // ----- EVENTS -----
    addBtn.addEventListener('click', () => {
      const success = addTask(taskInput.value, taskDate.value, taskTime.value);
      if (success) resetInputs();
    });
    taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addBtn.click(); });
    clearCompletedBtn.addEventListener('click', clearCompleted);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && editingId) { editingId = null; render(); }
    });

    // ----- DEMO TASKS -----
